<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer - Astronomy Picture of the Day</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <!-- NASA Header -->
  <div class="nasa-top-bar">
    <span class="nasa-label">NASA</span>
  </div>

  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="header-text">
        <h1>Astronomy Picture of the Day</h1>
        <p class="subtitle">Explore the Universe with NASA's Daily Images</p>
      </div>
    </header>

    <div class="filters">
      <label for="startDate">Start Date:</label>
      <input type="date" id="startDate" />
      <label for="endDate">End Date:</label>
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <footer class="nasa-footer">
      <p>Data provided by NASA's Astronomy Picture of the Day API</p>
      <p><small>For official NASA information, visit <strong>nasa.gov</strong></small></p>
    </footer>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
